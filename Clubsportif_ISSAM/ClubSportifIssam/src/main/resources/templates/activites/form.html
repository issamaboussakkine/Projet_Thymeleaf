<!DOCTYPE html>
<!-- Issam : Formulaire de création/modification d'activité -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Formulaire Activité - Issam ClubSportif')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content d-flex justify-content-center">
    <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
            <!-- Issam : Titre dynamique (Création ou Modification) -->
            <h3 class="text-primary" th:text="${activite.id == null ? 'Nouvelle Activité' : 'Modifier Activité'}">Nouvelle Activité</h3>
            <p class="text-muted">Remplissez les informations ci-dessous - Issam</p>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/activites/sauvegarder}" th:object="${activite}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label fw-bold">Nom de l'activité</label>
                    <input type="text" class="form-control" th:field="*{nom}" required placeholder="ex: Natation" />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Niveau</label>
                    <select class="form-select" th:field="*{niveau}" required>
                        <option value="">Sélectionner un niveau</option>
                        <option value="Débutant">Débutant</option>
                        <option value="Intermédiaire">Intermédiaire</option>
                        <option value="Avançé">Avançé</option>
                        <option value="Tous niveaux">Tous niveaux</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Capacité Maximale</label>
                    <input type="number" class="form-control" th:field="*{capacite}" required min="1" placeholder="ex: 15" />
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-save me-2"></i> Enregistrer</button>
                    <a href="/activites" class="btn btn-outline-secondary">Annuler et Retourner</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
