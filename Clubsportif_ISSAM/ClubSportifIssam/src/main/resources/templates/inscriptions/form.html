<!DOCTYPE html>
<!-- Issam : Formulaire de création/modification d'inscription -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Formulaire Inscription - Issam ClubSportif')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content d-flex justify-content-center">
    <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
            <h3 class="text-primary" th:text="${inscription.id == null ? 'Nouvelle Inscription' : 'Modifier Inscription'}">Nouvelle Inscription</h3>
            <p class="text-muted">Issam - Gestion des inscriptions</p>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/inscriptions/sauvegarder}" th:object="${inscription}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Membre</label>
                        <select class="form-select" th:field="*{membre.id}" required>
                            <option value="">Sélectionner un membre</option>
                            <option th:each="m : ${membres}" th:value="${m.id}" th:text="${m.nom}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Activité</label>
                        <select class="form-select" th:field="*{activite.id}" required>
                            <option value="">Sélectionner une activité</option>
                            <option th:each="a : ${activites}" th:value="${a.id}" th:text="${a.nom + ' (' + a.niveau + ')'}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Date d'inscription</label>
                        <input type="date" class="form-control" th:field="*{date}" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Statut</label>
                        <select class="form-select" th:field="*{statut}" required>
                            <option value="En attente">En attente</option>
                            <option value="Payé">Payé</option>
                            <option value="Annulé">Annulé</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Montant (DH)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{montant}" required placeholder="ex: 150.00" />
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-save me-2"></i> Valider l'inscription</button>
                    <a href="/inscriptions" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
<!-- Issam : Script pour pré-remplir la date du jour -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.querySelector('input[type="date"]');
        if (!dateInput.value) {
            dateInput.valueAsDate = new Date();
        }
    });
</script>
</body>
</html>
