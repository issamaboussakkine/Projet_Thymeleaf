<!DOCTYPE html>
<!-- Issam : Formulaire de création/modification de membre -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Formulaire Membre - Issam ClubSportif')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content d-flex justify-content-center">
    <div class="card shadow-sm border-0 w-100" style="max-width: 600px;">
        <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
            <!-- Issam : Titre dynamique selon création ou modification -->
            <h3 class="text-primary" th:text="${membre.id == null ? 'Nouveau Membre' : 'Modifier Membre'}">Nouveau Membre</h3>
            <p class="text-muted">Renseignez le profil du membre - Issam</p>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/membres/sauvegarder}" th:object="${membre}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label class="form-label fw-bold">Nom Complet</label>
                    <input type="text" class="form-control" th:field="*{nom}" required placeholder="ex: Issam ABOUSSAKKINE" />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Catégorie</label>
                    <select class="form-select" th:field="*{categorie}" required>
                        <option value="Junior">Junior</option>
                        <option value="Standard" selected>Standard</option>
                        <option value="Premium">Premium</option>
                        <option value="Senior">Senior</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Date d'adhésion</label>
                    <input type="date" class="form-control" th:field="*{dateAdhesion}" required />
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="fa-solid fa-save me-2"></i> Enregistrer le membre</button>
                    <a href="/membres" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
<!-- Issam : Script pour pré-remplir la date du jour -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.querySelector('input[type="date"]');
        if (!dateInput.value) {
            dateInput.valueAsDate = new Date();
        }
    });
</script>
</body>
</html>
