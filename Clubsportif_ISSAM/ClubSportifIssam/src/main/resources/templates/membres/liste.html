<!DOCTYPE html>
<!-- Issam : Liste des membres du club sportif -->
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Liste des Membres - Issam ClubSportif')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content bg-white p-4 rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="fa-solid fa-users me-2"></i> Gestion des Membres - Issam</h2>
        <a href="/membres/nouveau" class="btn btn-primary"><i class="fa-solid fa-user-plus me-1"></i> Ajouter Membre</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            32
            <th>ID</th>
            <th>Nom Complet</th>
            <th>Catégorie</th>
            <th>Date d'adhésion</th>
            <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="membre : ${membres}">
                <td class="fw-bold" th:text="${membre.id}">1</td>
                <td th:text="${membre.nom}">Issam ABOUSSAKKINE</td>
                <td>
                        <span class="badge"
                              th:classappend="${membre.categorie == 'Premium' ? 'bg-warning text-dark' : (membre.categorie == 'Junior' ? 'bg-success' : 'bg-info text-dark')}"
                              th:text="${membre.categorie}">Standard</span>
                </td>
                <td th:text="${#temporals.format(membre.dateAdhesion, 'yyyy-MM-dd')}">2026-03-28</td>
                <td class="text-center">
                    <a th:href="@{/membres/modifier/{id}(id=${membre.id})}" class="btn btn-sm btn-warning">
                        <i class="fa-solid fa-pen"></i>
                    </a>
                    <a th:href="@{/membres/supprimer/{id}(id=${membre.id})}" class="btn btn-sm btn-danger ms-1"
                       onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce membre ?');">
                        <i class="fa-solid fa-trash"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(membres)}">
                <td colspan="5" class="text-center text-muted py-4">Aucun membre n'est enregistré.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
