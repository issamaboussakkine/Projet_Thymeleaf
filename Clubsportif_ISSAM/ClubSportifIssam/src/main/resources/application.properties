# ============================================
# Issam : Configuration du serveur
# ============================================
server.port=8086

# ============================================
# Issam : Configuration de la base de donnÈes
# Base : club_sportif_issam (personnalisÈe)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/club_sportif_issam?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# Issam : Configuration JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Issam : Configuration Thymeleaf (dÈsactiver cache pour le dÈveloppement)
# ============================================
spring.thymeleaf.cache=false

# ============================================
# Issam : Gestion des erreurs
# ============================================
server.error.include-stacktrace=always

# ============================================
# Issam : Informations de l'application (optionnel)
# ============================================
spring.application.name=issam-club-sportif