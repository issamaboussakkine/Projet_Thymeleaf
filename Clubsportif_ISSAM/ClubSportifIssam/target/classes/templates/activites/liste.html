<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Liste des Activités - ClubSportifIssam')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content bg-white p-4 rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary"><i class="fa-solid fa-running me-2"></i> Gestion des Activités</h2>
        <a href="/activites/nouveau" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i> Ajouter Activité</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Niveau</th>
                    <th>Capacité</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="activite : ${activites}">
                    <td class="fw-bold" th:text="${activite.id}">1</td>
                    <td th:text="${activite.nom}">Yoga</td>
                    <td><span class="badge bg-secondary" th:text="${activite.niveau}">Débutant</span></td>
                    <td th:text="${activite.capacite}">20</td>
                    <td class="text-center">
                        <a th:href="@{/activites/modifier/{id}(id=${activite.id})}" class="btn btn-sm btn-warning">
                            <i class="fa-solid fa-pen"></i> Modifier
                        </a>
                        <a th:href="@{/activites/supprimer/{id}(id=${activite.id})}" class="btn btn-sm btn-danger ms-1" 
                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette activité ?');">
                            <i class="fa-solid fa-trash"></i> Supprimer
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(activites)}">
                    <td colspan="5" class="text-center text-muted py-4">Aucune activité trouvée. Ajoutez-en une !</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
