<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">ClubSportifIssam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #10B981; /* Green */
            --secondary-color: #F97316; /* Orange */
            --bg-color: #F3F4F6;
        }
        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; }
        .navbar-custom { background-color: var(--primary-color) !important; }
        .navbar-custom .navbar-brand, .navbar-custom .nav-link { color: white !important; font-weight: 500; }
        .navbar-custom .nav-link:hover { color: var(--secondary-color) !important; }
        .btn-primary { background-color: var(--primary-color); border-color: var(--primary-color); }
        .btn-primary:hover { background-color: #059669; border-color: #059669; }
        .btn-warning { background-color: var(--secondary-color); border-color: var(--secondary-color); color: white; }
        .btn-warning:hover { background-color: #EA580C; border-color: #EA580C; color: white; }
        .text-primary { color: var(--primary-color) !important; }
        .text-secondary { color: var(--secondary-color) !important; }
        footer { background-color: #111827; color: white; margin-top: auto; }
        .main-wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .content { flex: 1; }
    </style>
</head>
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-custom mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa-solid fa-dumbbell me-2"></i> ClubSportifIssam
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/statistiques">Tableau de Bord</a></li>
                    <li class="nav-item"><a class="nav-link" href="/activites">Activités</a></li>
                    <li class="nav-item"><a class="nav-link" href="/membres">Membres</a></li>
                    <li class="nav-item"><a class="nav-link" href="/inscriptions">Inscriptions</a></li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<footer th:fragment="footer" class="py-4 text-center">
    <div class="container">
        <p class="mb-0">© 2026 ClubSportifIssam. Développé par <span class="text-secondary fw-bold">Issam ABOUSSAKKINE</span>.</p>
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
