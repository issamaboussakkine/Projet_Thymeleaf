<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Statistiques - ClubSportifIssam')}"></head>
<body class="main-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<div class="container content">
    <h2 class="mb-4 text-primary"><i class="fa-solid fa-chart-pie me-2"></i> Tableau de bord & Statistiques</h2>

    <div class="row mb-5">
        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 h-100 py-3">
                <div class="card-body">
                    <i class="fa-solid fa-users fa-3x text-primary mb-3"></i>
                    <h3 class="card-title" th:text="${totalMembres}">0</h3>
                    <p class="text-muted">Total Membres</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 h-100 py-3">
                <div class="card-body">
                    <i class="fa-solid fa-running fa-3x text-secondary mb-3"></i>
                    <h3 class="card-title" th:text="${totalActivites}">0</h3>
                    <p class="text-muted">Total Activités</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm border-0 h-100 py-3">
                <div class="card-body">
                    <i class="fa-solid fa-file-signature fa-3x text-info mb-3"></i>
                    <h3 class="card-title" th:text="${totalInscriptions}">0</h3>
                    <p class="text-muted">Inscriptions Réalisées</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="text-secondary"><i class="fa-solid fa-chart-bar me-2"></i>Fréquentation par Activité</h4>
                </div>
                <div class="card-body">
                    <table class="table table-hover mt-3">
                        <thead>
                            <tr>
                                <th>Activité</th>
                                <th>Niveau</th>
                                <th>Capacité Max</th>
                                <th>Inscrits</th>
                                <th>Taux de remplissage</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="activite : ${activites}">
                                <td th:text="${activite.nom}">Yoga</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${activite.niveau}">Débutant</span>
                                </td>
                                <td th:text="${activite.capacite}">20</td>
                                <td th:text="${#lists.size(activite.inscriptions)}">5</td>
                                <td>
                                    <div class="progress" style="height: 20px;">
                                        <div class="progress-bar bg-primary" role="progressbar" 
                                             th:style="'width: ' + (${activite.capacite > 0 ? (#lists.size(activite.inscriptions) * 100 / activite.capacite) : 0}) + '%;'" 
                                             th:text="${activite.capacite > 0 ? (#lists.size(activite.inscriptions) * 100 / activite.capacite) : 0} + '%'">
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(activites)}">
                                <td colspan="5" class="text-center text-muted py-4">Aucune activité disponible</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
